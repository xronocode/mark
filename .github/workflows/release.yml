name: Build/Release Mark

on:
  push:
    tags:
      - v*.*.*

jobs:
  release:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.required == false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — primary target for v1.0; blocking.
          - os: macos-14
            arch: arm64
            required: true
            label: mac-arm64
          # macOS Intel — secondary target; blocking.
          - os: macos-13
            arch: x64
            required: true
            label: mac-x64
          # Linux — best effort; failure does not block release.
          - os: ubuntu-22.04
            arch: x64
            required: false
            label: linux
          # Windows — best effort; failure does not block release.
          - os: windows-latest
            arch: x64
            required: false
            label: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Install Linux build dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      # --ignore-scripts skips native postinstall; we run electron-rebuild explicitly below.
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts --loglevel verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Electron 33+ requires C++17+ to build native modules. CXXFLAGS covers
      # .cc/.cpp invocations; for Objective-C++ (.mm) sources Xcode reads
      # xcode_settings from the binding.gyp. native-keymap doesn't declare
      # xcode_settings for macOS, so on modern macos-14 runners its
      # keyboard_mac.mm fails to find `constexpr` in the bundled chromium
      # macros header. Patch its binding.gyp before rebuilding.
      - name: Set C++ flags (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: echo "CXXFLAGS=-std=gnu++17 -stdlib=libc++" >> $GITHUB_ENV

      - name: Patch native-keymap for Xcode C++17 (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: node scripts/patch-native-keymap-mac.js

      - name: Rebuild native modules (macOS / Windows)
        if: ${{ !startsWith(matrix.os, 'ubuntu-') }}
        run: npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Force gcc/g++ on Linux for electron-rebuild (clang fails on some native deps).
      - name: Rebuild native modules (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: USE_ELECTRON_CLANG=0 npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Minify locales
        run: npm run minify-locales

      - name: Vite build
        run: npm run build

      - name: Package (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: npx electron-builder --linux --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: startsWith(matrix.os, 'windows-')
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ad-hoc signature (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          APP_PATH=$(find dist -maxdepth 3 -name 'Mark.app' -type d | head -1)
          echo "Signed bundle: $APP_PATH"
          codesign --verify --verbose=2 "$APP_PATH"
          codesign -d -v "$APP_PATH" 2>&1 | grep -E 'Signature|Identifier|Authority'

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # Draft until the maintainer manually clicks "Publish release" in the
          # GitHub UI. This contains the blast radius if a build job partially
          # fails — half-baked artifacts never surface publicly.
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          name: Mark ${{ github.ref_name }}
          body: |
            ## Mark ${{ github.ref_name }}

            Modernized fork of [marktext/marktext](https://github.com/marktext/marktext) tracking [Tkaixiang/marktext](https://github.com/Tkaixiang/marktext) upstream, with Russian localization and ad-hoc macOS signing.

            ### macOS

            Recommended install via Homebrew tap:

            ```bash
            brew tap xronocode/mark
            brew install --cask mark
            ```

            The cask's postflight script clears the quarantine attribute automatically — no manual `xattr -cr` is needed. Builds are ad-hoc signed (`codesign --sign -`) for Apple Silicon Gatekeeper compliance, but not Apple-notarized.

            If installing the DMG manually, you may need to run once after dragging Mark.app to /Applications:
            ```bash
            xattr -cr /Applications/Mark.app
            ```

            ### Windows / Linux

            Download the appropriate artifact below.

            ### Changes
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
